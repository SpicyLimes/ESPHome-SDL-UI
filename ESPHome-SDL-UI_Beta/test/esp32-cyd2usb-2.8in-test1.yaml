# ---------------------------------------- #
# ESPHome Bathroom Touchpad
# Version 2a
# Filename: ESP-Screen-Remote-v2a-Base.yaml
# File Description: Base Configuration
# ---------------------------------------- #
esphome:
  name: "esphome-web-e5cd38"
  friendly_name: "ESPHome Bathroom Touchpad"
  min_version: 2025.12.0
  name_add_mac_suffix: false

# ---------------------------------------- #
# Substitutions Configuration
# ---------------------------------------- #
substitutions:
  # Device Identity
  device_name: "esphome-web-e5cd38"
  friendly_name: "ESPHome Bathroom Touchpad"

  # Display Pins (ESP32-CYD / 2432S028R)
  lcd_clk: GPIO14
  lcd_mosi: GPIO13
  lcd_miso: GPIO12
  lcd_cs: "15"
  lcd_dc: "2"
  
  # Touchscreen Pins
  touch_clk: GPIO25
  touch_mosi: GPIO32
  touch_miso: GPIO39
  touch_cs: "33"
  touch_irq: "36"

  # Light Pins
  backlight_pin: GPIO21
  led_red_pin: GPIO4
  led_green_pin: GPIO16
  led_blue_pin: GPIO17

  # UI Colors (Hex - Board is BGR)
  color_accent: "00AAFF"    # Orange (BGR)
  color_silver: "646464"    # Silver

  # Audio Pins
  speaker_pin: GPIO26

  # Automation Entities
  vibration_sensor_entity: binary_sensor.zigbee_door_vibration_sensor_1_vibration

# ---------------------------------------- #
# ESP32-CYD2USB Board Info
# ---------------------------------------- #
esp32:
  board: esp32dev
  framework:
    type: esp-idf

# ---------------------------------------- #
# Logger, API, and OTA Configuration
# ---------------------------------------- #
logger:
api:
ota:
  - platform: esphome

# ---------------------------------------- #
# NTP Time Configuration
# ---------------------------------------- #
time:
  - platform: homeassistant
    id: ha_time
    timezone: "America/Chicago"

# ---------------------------------------- #
# Network Configuration
# ---------------------------------------- #
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  on_connect:
    then:
      - light.turn_on:
          id: led
          red: 0%
          green: 0%
          blue: 100%
          brightness: 100%
  on_disconnect:
    then:
      - light.turn_on:
          id: led
          red: 100%
          green: 0%
          blue: 100%
          brightness: 100%

# ---------------------------------------- #
# Web Server Configuration
# ---------------------------------------- #
web_server:
  port: 80
  version: 3

# ---------------------------------------- #
# Substitution Configuration
# ---------------------------------------- #
substitutions:
  # Default placeholder for validation
  device_name: "esphome-web-e5cd38"

# ---------------------------------------- #
# Audio & Speaker Configuration
# ---------------------------------------- #
rtttl:
  id: buzzer
  output: speaker
  gain: 0.1 

# ---------------------------------------- #
# Global Variable Configuration
# ---------------------------------------- #
globals:
  - id: active_temperature
    type: float
    initial_value: '0.0'
  - id: active_humidity
    type: float
    initial_value: '0.0'
  - id: using_backup_sensors
    type: bool
    initial_value: 'false'

# ---------------------------------------- #
# Font Configuration
# ---------------------------------------- #
font: 
  - file: "gfonts://Roboto@500"
    id: big_text
    size: 72
    bpp: 4
  - file: "gfonts://Roboto@300"
    id: notice_text
    size: 26
    bpp: 4
  - file: "gfonts://Roboto@700"
    id: label
    size: 13
    bpp: 4
  - file: "gfonts://Roboto@500"
    id: climate
    size: 16
    bpp: 4
  - file: "gfonts://Roboto@700"
    id: title_font
    size: 16
    bpp: 4
  - file: 'https://spicylimes.io/fonts/general/fonts/materialdesignicons-webfont.ttf'
    id: materialdesign_icons
    size: 35
    glyphs: ["\U000F0FE1", "\U000F1A4C", "\U000F11E1", "\U000F0210", "\U000F1958", "\U000F02C8", "\U000F07D0", "\U000F10D3", "\U000F0928", "\U000F092F", "\U000F1157", "\U000F09A1", "\U000F013E", "\U000F013D"]

# ---------------------------------------- #
# Color Configuration
# ---------------------------------------- #
color:
  - id: ACCENT
    hex: ${color_accent}
  - id: SILVER
    hex: ${color_silver}

# ---------------------------------------- #
# Sensor Configuration
# ---------------------------------------- #
sensor:
  - platform: homeassistant
    id: weatherflow_power_save
    entity_id: sensor.ftw_alliance_sensors_power_save_mode
    internal: true
    on_value:
      then:
        - lambda: |-
            id(using_backup_sensors) = (x == 3);
            std::string src = id(using_backup_sensors) ? "ThermoPro" : "WeatherFlow";
            id(weather_source).publish_state(src);
            ESP_LOGI("sensor_switch", "Source: %s", src.c_str());
        - component.update: my_display

  - platform: homeassistant
    id: weatherflow_temp
    entity_id: sensor.ftw_alliance_sensors_temperature
    internal: true
    on_value:
      then:
        - lambda: 'if (!id(using_backup_sensors)) id(active_temperature) = x;'
        - component.update: my_display

  - platform: homeassistant
    id: weatherflow_humidity
    entity_id: sensor.ftw_alliance_sensors_humidity
    internal: true
    on_value:
      then:
        - lambda: 'if (!id(using_backup_sensors)) id(active_humidity) = x;'
        - component.update: my_display

  - platform: homeassistant
    id: thermopro_temp
    entity_id: sensor.thermopro_hygrometer_temperature
    internal: true
    on_value:
      then:
        - lambda: 'if (id(using_backup_sensors)) id(active_temperature) = x;'
        - component.update: my_display

  - platform: homeassistant
    id: thermopro_humidity
    entity_id: sensor.thermopro_hygrometer_humidity
    internal: true
    on_value:
      then:
        - lambda: 'if (id(using_backup_sensors)) id(active_humidity) = x;'
        - component.update: my_display

  - platform: uptime
    name: "Uptime"
    id: uptime_s
    update_interval: 45s
  - platform: adc
    name: "Light Sensor"
    pin: GPIO34
    id: light_sensor
    update_interval: 60s

# ---------------------------------------- #
# Binary Sensor Configuration
# ---------------------------------------- #
binary_sensor:
  - platform: status
    name: "Node Status"
    id: system_status

  # Vibration Sensor Placeholder (from Remote-2)
  - platform: homeassistant
    id: vibration_sensor
    entity_id: ${vibration_sensor_entity}
    on_press:
      then:
        - rtttl.play: "ding:d=4,o=5,b=250:p,e,c"

  - platform: touchscreen
    name: Button 1
    x_min: 53
    x_max: 131
    y_min: 18
    y_max: 63
    internal: true
    on_press:
      then:
        - homeassistant.event:
            event: esphome.button_pressed
            data:
              button: "1"
              device: ${device_name}
  - platform: touchscreen
    name: Button 2
    x_min: 53
    x_max: 131  
    y_min: 72
    y_max: 115
    internal: true
    on_press:
      then:
        - homeassistant.event:
            event: esphome.button_pressed
            data:
              button: "2"
              device: ${device_name}
  - platform: touchscreen
    name: Button 3
    x_min: 53
    x_max: 131   
    y_min: 126
    y_max: 169
    internal: true
    on_press:
      then:
        - homeassistant.event:
            event: esphome.button_pressed
            data:
              button: "3"
              device: ${device_name}
  - platform: touchscreen
    name: Button 4
    x_min: 53
    x_max: 131     
    y_min: 178
    y_max: 224
    internal: true
    on_press:
      then:
        - homeassistant.event:
            event: esphome.button_pressed
            data:
              button: "4"
              device: ${device_name}

# ---------------------------------------- #
# Text Sensor Configuration
# ---------------------------------------- #
text_sensor:
  - platform: template
    name: "Uptime Formatted"
    lambda: |-
      uint32_t dur = id(uptime_s).state;
      int d = dur / 86400, h = (dur / 3600) % 24, m = (dur / 60) % 60, s = dur % 60;
      return { (std::to_string(d) + "d " + std::to_string(h) + "h " + std::to_string(m) + "m " + std::to_string(s) + "s").c_str() };
    icon: mdi:clock-start
    update_interval: 60s
  - platform: template
    name: "Weather Source"
    id: weather_source
    icon: mdi:weather-cloudy
  - platform: wifi_info
    ip_address:
      name: "IP Address"
  - platform: version
    name: "ESPHome Version"
  - platform: homeassistant
    id: button1
    entity_id: switch.bathroom_light
    on_value:
      then:
        - component.update: my_display
  - platform: homeassistant
    id: button2
    entity_id: input_boolean.esp32_bathroom_potty_toggle
    on_value:
      then:
        - component.update: my_display
  - platform: homeassistant
    id: button3
    entity_id: input_boolean.esp32_bathroom_shower_toggle
    on_value:
      then:
        - component.update: my_display
  - platform: homeassistant
    id: button4
    entity_id: switch.bathroom_air_freshener
    on_value:
      then:
        - component.update: my_display
  - platform: homeassistant
    id: time_swap
    entity_id: automation.bathroom_motion_sensor_closet_light_modified
    on_value:
      then:
        - component.update: my_display
  - platform: homeassistant
    id: weatherflow_forecast
    entity_id: weather.forecast_ftw_alliance
    internal: true
    on_value:
      then:
        - component.update: my_display

# ---------------------------------------- #
# Switch Configuration
# ---------------------------------------- #
switch:
  - platform: restart
    name: "Restart"  

# ---------------------------------------- #
# SPI Configuration
# ---------------------------------------- #
spi:
  - id: lcd_bus
    clk_pin: ${lcd_clk}
    mosi_pin: ${lcd_mosi}
    miso_pin:
      number: ${lcd_miso}
      ignore_strapping_warning: true
  - id: touch_bus
    clk_pin: ${touch_clk}
    mosi_pin: ${touch_mosi}
    miso_pin: ${touch_miso}

# ---------------------------------------- #
# Output Configuration
# ---------------------------------------- #
output:
  - platform: ledc
    pin: ${backlight_pin}
    id: gpio_backlight_pwm
  - platform: ledc
    id: output_red
    pin: ${led_red_pin}
    inverted: true
  - platform: ledc
    id: output_green
    pin: ${led_green_pin}
    inverted: true
  - platform: ledc
    id: output_blue
    pin: ${led_blue_pin}
    inverted: true
  - platform: ledc
    pin: ${speaker_pin}
    id: speaker
    frequency: 1000Hz

# ---------------------------------------- #
# Light Configuration
# ---------------------------------------- #
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Backlight"
    id: back_light
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: rgb
    name: LED
    id: led
    red: output_red
    green: output_green
    blue: output_blue
    restore_mode: ALWAYS_OFF

# ---------------------------------------- #
# Touchscreen Configuration
# ---------------------------------------- #
touchscreen:
  platform: xpt2046
  spi_id: touch_bus
  cs_pin: ${touch_cs}
  interrupt_pin: ${touch_irq}
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 280
    x_max: 3860
    y_min: 340
    y_max: 3860
  transform:
    swap_xy: false
    mirror_x: false
    mirror_y: true

# ---------------------------------------- #
# Display Configuration
# ---------------------------------------- #
display:
  - platform: ili9xxx
    id: my_display
    spi_id: lcd_bus
    model: ILI9342
    color_palette: 8BIT
    cs_pin:
      number: ${lcd_cs}
      ignore_strapping_warning: true
    dc_pin:
      number: ${lcd_dc}
      ignore_strapping_warning: true
    rotation: 0
    invert_colors: false
    dimensions:
      height: 240
      width: 320
    update_interval: 60s

    pages:      
      - id: lockscreen_page
        lambda: |-
          // Static maps to avoid re-creation on every update
          static const char* day_names[] = {"?", "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
          static const char* month_names[] = {"?", "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"};

          auto white = Color(255, 255, 255);
          auto black = Color(0, 0, 0);
          
          // Weather bar at top
          int bar_h = 22;
          it.filled_rectangle(0, 0, it.get_width(), bar_h, id(SILVER));
          
          // Weather Condition Lookup
          std::string raw_w = id(weatherflow_forecast).state;
          static std::map<std::string, std::string> w_map = {
            {"clear-night", "Clear Night"}, {"cloudy", "Cloudy"}, {"exceptional", "Exceptional"},
            {"fog", "Fog"}, {"hail", "Hail"}, {"lightning", "Lightning"},
            {"lightning-rainy", "Lightning Rainy"}, {"partlycloudy", "Partly Cloudy"},
            {"pouring", "Pouring"}, {"rainy", "Rainy"}, {"snowy", "Snowy"},
            {"snowy-rainy", "Snowy Rainy"}, {"sunny", "Sunny"}, {"windy", "Windy"}, {"windy-variant", "Windy Cloudy"}
          };
          std::string fmt_w = w_map.count(raw_w) ? w_map[raw_w] : raw_w;
          
          it.printf(5, bar_h/2, id(climate), black, TextAlign::CENTER_LEFT, "%s", fmt_w.c_str());
          
          // Sensor Source
          it.printf(it.get_width()/2, bar_h/2, id(title_font), black, TextAlign::CENTER, "%s", 
                     id(using_backup_sensors) ? "[ Patio ]" : "[ Tempest ]");
          
          // Temp/Humidity
          it.printf(it.get_width() - 5, bar_h/2, id(climate), black, TextAlign::CENTER_RIGHT, "%.0f°F / %.0f%%", 
                     id(active_temperature), id(active_humidity));

          // Buttons UI
          int b_y = 170;
          int spacing = 70;
          int start_x = (it.get_width()/2) - (spacing * 1.5);

          auto draw_btn = [&](int idx, const char* label_txt, const char* icon_txt, bool state) {
            int bx = start_x + (idx * spacing);
            if (!state) {
              it.circle(bx, b_y, 30, id(ACCENT));
              it.printf(bx, b_y, id(materialdesign_icons), id(SILVER), TextAlign::CENTER, icon_txt);
            } else {
              it.filled_circle(bx, b_y, 30, id(ACCENT));
              it.printf(bx, b_y, id(materialdesign_icons), black, TextAlign::CENTER, icon_txt);
            }
            it.printf(bx, b_y + 45, id(label), white, TextAlign::CENTER, label_txt);
          };

          draw_btn(0, "Light", "\U000F11E1", id(button1).state == "on");
          draw_btn(1, "Potty", "\U000F1157", id(button2).state == "on");
          draw_btn(2, "Shower", "\U000F09A1", id(button3).state == "on");
          draw_btn(3, "Freshener", "\U000F1958", id(button4).state == "on");

          // Date & Time
          auto now = id(ha_time).now();
          
          // Suffix logic
          const char* suffix = "th";
          int d = now.day_of_month;
          if (d % 10 == 1 && d % 100 != 11) suffix = "st";
          else if (d % 10 == 2 && d % 100 != 12) suffix = "nd";
          else if (d % 10 == 3 && d % 100 != 13) suffix = "rd";

          it.printf(it.get_width()/2, it.get_height()/2 - 72, id(notice_text), white, TextAlign::CENTER, 
                     "%s, %s %d%s", day_names[now.day_of_week], month_names[now.month], d, suffix);

          int h = now.hour % 12;
          if (h == 0) h = 12;
          
          Color c_color = (id(time_swap).state == "on") ? id(ACCENT) : white;
          it.printf(it.get_width()/2, it.get_height()/2 - 18, id(big_text), c_color, TextAlign::CENTER, 
                     "%d:%02d %s", h, now.minute, now.hour < 12 ? "AM" : "PM");