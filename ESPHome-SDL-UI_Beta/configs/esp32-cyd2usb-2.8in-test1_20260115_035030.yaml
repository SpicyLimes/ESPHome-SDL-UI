esphome:
  name: esphome-web-e5cd38
  friendly_name: ESPHome Bathroom Touchpad
  min_version: 2025.12.0
  name_add_mac_suffix: false
substitutions:
  device_name: esphome-web-e5cd38
  friendly_name: ESPHome Bathroom Touchpad
  lcd_clk: GPIO14
  lcd_mosi: GPIO13
  lcd_miso: GPIO12
  lcd_cs: '15'
  lcd_dc: '2'
  touch_clk: GPIO25
  touch_mosi: GPIO32
  touch_miso: GPIO39
  touch_cs: '33'
  touch_irq: '36'
  backlight_pin: GPIO21
  led_red_pin: GPIO4
  led_green_pin: GPIO16
  led_blue_pin: GPIO17
  color_accent: 00AAFF
  color_silver: '646464'
  speaker_pin: GPIO26
  vibration_sensor_entity: binary_sensor.zigbee_door_vibration_sensor_1_vibration
logger: null
api: null
time:
- platform: homeassistant
  id: ha_time
  timezone: America/Chicago
globals:
- id: active_temperature
  type: float
  initial_value: '0.0'
- id: active_humidity
  type: float
  initial_value: '0.0'
- id: using_backup_sensors
  type: bool
  initial_value: 'false'
font:
- file: gfonts://Roboto@500
  id: big_text
  size: 72
  bpp: 4
- file: gfonts://Roboto@300
  id: notice_text
  size: 26
  bpp: 4
- file: gfonts://Roboto@700
  id: label
  size: 13
  bpp: 4
- file: gfonts://Roboto@500
  id: climate
  size: 16
  bpp: 4
- file: gfonts://Roboto@700
  id: title_font
  size: 16
  bpp: 4
- file: https://spicylimes.io/fonts/general/materialdesignicons-webfont.ttf
  id: materialdesign_icons
  size: 35
  glyphs:
  - 󰿡
  - 󱩌
  - 󱇡
  - 󰈐
  - 󱥘
  - 󰋈
  - 󰟐
  - 󱃓
  - 󰤨
  - 󰤯
  - 󱅗
  - 󰦡
  - 󰄾
  - 󰄽
color:
- id: ACCENT
  hex: ${color_accent}
- id: SILVER
  hex: ${color_silver}
sensor:
- platform: homeassistant
  id: weatherflow_power_save
  entity_id: sensor.ftw_alliance_sensors_power_save_mode
  internal: true
  on_value:
    then:
    - lambda: 'id(using_backup_sensors) = (x == 3);

        std::string src = id(using_backup_sensors) ? "ThermoPro" : "WeatherFlow";

        id(weather_source).publish_state(src);

        ESP_LOGI("sensor_switch", "Source: %s", src.c_str());'
    - component.update: my_display
- platform: homeassistant
  id: weatherflow_temp
  entity_id: sensor.ftw_alliance_sensors_temperature
  internal: true
  on_value:
    then:
    - lambda: if (!id(using_backup_sensors)) id(active_temperature) = x;
    - component.update: my_display
- platform: homeassistant
  id: weatherflow_humidity
  entity_id: sensor.ftw_alliance_sensors_humidity
  internal: true
  on_value:
    then:
    - lambda: if (!id(using_backup_sensors)) id(active_humidity) = x;
    - component.update: my_display
- platform: homeassistant
  id: thermopro_temp
  entity_id: sensor.thermopro_hygrometer_temperature
  internal: true
  on_value:
    then:
    - lambda: if (id(using_backup_sensors)) id(active_temperature) = x;
    - component.update: my_display
- platform: homeassistant
  id: thermopro_humidity
  entity_id: sensor.thermopro_hygrometer_humidity
  internal: true
  on_value:
    then:
    - lambda: if (id(using_backup_sensors)) id(active_humidity) = x;
    - component.update: my_display
- platform: uptime
  name: Uptime
  id: uptime_s
  update_interval: 45s
binary_sensor:
- platform: status
  name: Node Status
  id: system_status
- platform: homeassistant
  id: vibration_sensor
  entity_id: ${vibration_sensor_entity}
- platform: touchscreen
  name: Button 1
  x_min: 53
  x_max: 131
  y_min: 18
  y_max: 63
  internal: true
  on_press:
    then:
    - homeassistant.event:
        event: esphome.button_pressed
        data:
          button: '1'
          device: ${device_name}
- platform: touchscreen
  name: Button 2
  x_min: 53
  x_max: 131
  y_min: 72
  y_max: 115
  internal: true
  on_press:
    then:
    - homeassistant.event:
        event: esphome.button_pressed
        data:
          button: '2'
          device: ${device_name}
- platform: touchscreen
  name: Button 3
  x_min: 53
  x_max: 131
  y_min: 126
  y_max: 169
  internal: true
  on_press:
    then:
    - homeassistant.event:
        event: esphome.button_pressed
        data:
          button: '3'
          device: ${device_name}
- platform: touchscreen
  name: Button 4
  x_min: 53
  x_max: 131
  y_min: 178
  y_max: 224
  internal: true
  on_press:
    then:
    - homeassistant.event:
        event: esphome.button_pressed
        data:
          button: '4'
          device: ${device_name}
text_sensor:
- platform: template
  name: Uptime Formatted
  lambda: 'uint32_t dur = id(uptime_s).state;

    int d = dur / 86400, h = (dur / 3600) % 24, m = (dur / 60) % 60, s = dur % 60;

    return { (std::to_string(d) + "d " + std::to_string(h) + "h " + std::to_string(m)
    + "m " + std::to_string(s) + "s").c_str() };'
  icon: mdi:clock-start
  update_interval: 60s
- platform: template
  name: Weather Source
  id: weather_source
  icon: mdi:weather-cloudy
- platform: version
  name: ESPHome Version
- platform: homeassistant
  id: button1
  entity_id: switch.bathroom_light
  on_value:
    then:
    - component.update: my_display
- platform: homeassistant
  id: button2
  entity_id: input_boolean.esp32_bathroom_potty_toggle
  on_value:
    then:
    - component.update: my_display
- platform: homeassistant
  id: button3
  entity_id: input_boolean.esp32_bathroom_shower_toggle
  on_value:
    then:
    - component.update: my_display
- platform: homeassistant
  id: button4
  entity_id: switch.bathroom_air_freshener
  on_value:
    then:
    - component.update: my_display
- platform: homeassistant
  id: time_swap
  entity_id: automation.bathroom_motion_sensor_closet_light_modified
  on_value:
    then:
    - component.update: my_display
- platform: homeassistant
  id: weatherflow_forecast
  entity_id: weather.forecast_ftw_alliance
  internal: true
  on_value:
    then:
    - component.update: my_display
switch:
- platform: restart
  name: Restart
touchscreen:
  platform: sdl
display:
  platform: sdl
  id: my_display
  dimensions:
    height: 240
    width: 320
  update_interval: 60s
  pages:
  - id: lockscreen_page
    lambda: "// Static maps to avoid re-creation on every update\nstatic const char*\
      \ day_names[] = {\"?\", \"Sunday\", \"Monday\", \"Tuesday\", \"Wednesday\",\
      \ \"Thursday\", \"Friday\", \"Saturday\"};\nstatic const char* month_names[]\
      \ = {\"?\", \"January\", \"February\", \"March\", \"April\", \"May\", \"June\"\
      , \"July\", \"August\", \"September\", \"October\", \"November\", \"December\"\
      };\n\nauto white = Color(255, 255, 255);\nauto black = Color(0, 0, 0);\n\n//\
      \ Weather bar at top\nint bar_h = 22;\nit.filled_rectangle(0, 0, it.get_width(),\
      \ bar_h, id(SILVER));\n\n// Weather Condition Lookup\nstd::string raw_w = id(weatherflow_forecast).state;\n\
      static std::map<std::string, std::string> w_map = {\n  {\"clear-night\", \"\
      Clear Night\"}, {\"cloudy\", \"Cloudy\"}, {\"exceptional\", \"Exceptional\"\
      },\n  {\"fog\", \"Fog\"}, {\"hail\", \"Hail\"}, {\"lightning\", \"Lightning\"\
      },\n  {\"lightning-rainy\", \"Lightning Rainy\"}, {\"partlycloudy\", \"Partly\
      \ Cloudy\"},\n  {\"pouring\", \"Pouring\"}, {\"rainy\", \"Rainy\"}, {\"snowy\"\
      , \"Snowy\"},\n  {\"snowy-rainy\", \"Snowy Rainy\"}, {\"sunny\", \"Sunny\"},\
      \ {\"windy\", \"Windy\"}, {\"windy-variant\", \"Windy Cloudy\"}\n};\nstd::string\
      \ fmt_w = w_map.count(raw_w) ? w_map[raw_w] : raw_w;\n\nit.printf(5, bar_h/2,\
      \ id(climate), black, TextAlign::CENTER_LEFT, \"%s\", fmt_w.c_str());\n\n//\
      \ Sensor Source\nit.printf(it.get_width()/2, bar_h/2, id(title_font), black,\
      \ TextAlign::CENTER, \"%s\", \n           id(using_backup_sensors) ? \"[ Patio\
      \ ]\" : \"[ Tempest ]\");\n\n// Temp/Humidity\nit.printf(it.get_width() - 5,\
      \ bar_h/2, id(climate), black, TextAlign::CENTER_RIGHT, \"%.0f°F / %.0f%%\"\
      , \n           id(active_temperature), id(active_humidity));\n\n// Buttons UI\n\
      int b_y = 170;\nint spacing = 70;\nint start_x = (it.get_width()/2) - (spacing\
      \ * 1.5);\n\nauto draw_btn = [&](int idx, const char* label_txt, const char*\
      \ icon_txt, bool state) {\n  int bx = start_x + (idx * spacing);\n  if (!state)\
      \ {\n    it.circle(bx, b_y, 30, id(ACCENT));\n    it.printf(bx, b_y, id(materialdesign_icons),\
      \ id(SILVER), TextAlign::CENTER, icon_txt);\n  } else {\n    it.filled_circle(bx,\
      \ b_y, 30, id(ACCENT));\n    it.printf(bx, b_y, id(materialdesign_icons), black,\
      \ TextAlign::CENTER, icon_txt);\n  }\n  it.printf(bx, b_y + 45, id(label), white,\
      \ TextAlign::CENTER, label_txt);\n};\n\ndraw_btn(0, \"Light\", \"\\U000F11E1\"\
      , id(button1).state == \"on\");\ndraw_btn(1, \"Potty\", \"\\U000F1157\", id(button2).state\
      \ == \"on\");\ndraw_btn(2, \"Shower\", \"\\U000F09A1\", id(button3).state ==\
      \ \"on\");\ndraw_btn(3, \"Freshener\", \"\\U000F1958\", id(button4).state ==\
      \ \"on\");\n\n// Date & Time\nauto now = id(ha_time).now();\n\n// Suffix logic\n\
      const char* suffix = \"th\";\nint d = now.day_of_month;\nif (d % 10 == 1 &&\
      \ d % 100 != 11) suffix = \"st\";\nelse if (d % 10 == 2 && d % 100 != 12) suffix\
      \ = \"nd\";\nelse if (d % 10 == 3 && d % 100 != 13) suffix = \"rd\";\n\nit.printf(it.get_width()/2,\
      \ it.get_height()/2 - 72, id(notice_text), white, TextAlign::CENTER, \n    \
      \       \"%s, %s %d%s\", day_names[now.day_of_week], month_names[now.month],\
      \ d, suffix);\n\nint h = now.hour % 12;\nif (h == 0) h = 12;\n\nColor c_color\
      \ = (id(time_swap).state == \"on\") ? id(ACCENT) : white;\nit.printf(it.get_width()/2,\
      \ it.get_height()/2 - 18, id(big_text), c_color, TextAlign::CENTER, \n     \
      \      \"%d:%02d %s\", h, now.minute, now.hour < 12 ? \"AM\" : \"PM\");"
host: null
